# =============================================================================
# codemagic.yaml — Compose Multiplatform (Android + iOS) — Plano Gratuito
# =============================================================================

workflows:

  # ---------------------------------------------------------------------------
  # ANDROID — APK de debug
  # ---------------------------------------------------------------------------
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17

    scripts:
      - name: Preparar gradlew
        script: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Build APK debug
        script: ./gradlew :composeApp:assembleDebug

    artifacts:
      - composeApp/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - seu@email.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # iOS — .ipa sem conta paga (AltStore / Sideloadly)
  # ---------------------------------------------------------------------------
  ios-free:
    name: iOS Build (AltStore / Sideloadly)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default
      java: 17
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY

    scripts:
      - name: Preparar gradlew
        script: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Criar local.properties com variáveis do Supabase
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL"         >> local.properties
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> local.properties

      - name: Instalar CocoaPods
        script: |
          cd iosApp
          pod install || pod install --repo-update

      - name: Build e archive sem assinatura
        script: |
          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/iosApp.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            archive

      - name: Empacotar .ipa para sideload
        script: |
          mkdir -p "$CM_BUILD_DIR/Payload"
          APP_PATH=$(find "$CM_BUILD_DIR/iosApp.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "App encontrado: $APP_PATH"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r iosApp.ipa Payload/
          echo "✅ .ipa gerado!"

    artifacts:
      - $CM_BUILD_DIR/iosApp.ipa

    publishing:
      email:
        recipients:
          - seu@email.com
        notify:
          success: true
          failure: true